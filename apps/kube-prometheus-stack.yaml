apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.15.1
    helm:
      values: |
        # k3s runs these inside the k3s process, not as scrapeable pods.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false

        prometheus:
          prometheusSpec:
            retention: 5d
            # Pick up ServiceMonitors/PrometheusRules created outside this Helm release.
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ["alertname", "service"]
              group_wait: 10s
              group_interval: 30s
              repeat_interval: 1h
              receiver: "null"
              routes:
                - receiver: "sre-copilot"
                  matchers:
                    - service = "demo-api"
            receivers:
              - name: "null"
              - name: "sre-copilot"
                webhook_configs:
                  - url: "http://sre-copilot.sre-copilot.svc.cluster.local:8080/alert"
                    send_resolved: true

        grafana:
          adminPassword: admin
          service:
            type: LoadBalancer
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 2Gi
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                maxLines: 1000
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
