apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-rules
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/allena9/cse499-gitops.git
    targetRevision: main
    path: manifests/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
