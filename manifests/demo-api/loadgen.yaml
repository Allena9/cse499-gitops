apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  labels:
    app: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
        - name: loadgen
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - "while true; do wget -q -O /dev/null http://demo-api.demo.svc.cluster.local/work || true; sleep 1; done"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
