apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-copilot
  labels:
    app: sre-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-copilot
  template:
    metadata:
      labels:
        app: sre-copilot
    spec:
      serviceAccountName: sre-copilot
      containers:
        - name: sre-copilot
          image: python:3.12-slim
          command: ["python", "-u", "/app/copilot.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GITHUB_REPO
              value: "allena9/cse499-gitops"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic
                  key: api-key
          volumeMounts:
            - name: code
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: code
          configMap:
            name: sre-copilot-code
